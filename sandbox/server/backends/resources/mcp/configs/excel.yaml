# Excel
# Source: https://github.com/haris-musa/excel-mcp-server
# Mock: local server
type: stdio
name: excel
params:
  command: uv
  args:
    - "--directory"
    - "${local_servers_paths}/excel-mcp-server/environment"
    - "run"
    - "excel-mcp-server"
    - "stdio"
  cwd: "${agent_workspace}"
client_session_timeout_seconds: 300
cache_tools_list: true
