# Word
# Source: https://github.com/GongRzhe/Office-Word-MCP-Server
# Mock: local server
type: stdio
name: word
params:
  command: uv
  args:
    - "--directory"
    - "${local_servers_paths}/Office-Word-MCP-Server/environment"
