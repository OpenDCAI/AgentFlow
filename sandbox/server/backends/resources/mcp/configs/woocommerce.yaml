# WooCommerce MCP Server
# Source: https://github.com/lockon-n/woocommerce-mcp
# Mock: PG-backed local server
type: stdio
name: woocommerce
params:
  command: node
  args:
    - "${local_servers_paths}/woocommerce-mcp/environment/dist/index.js"
  env:
    WORDPRESS_SITE_URL: "http://localhost"
    WOOCOMMERCE_CONSUMER_KEY: "placeholder"
    WOOCOMMERCE_CONSUMER_SECRET: "placeholder"
    PG_HOST: "${config.pg_host}"
    PG_PORT: "5434"
    PG_DATABASE: "${config.pg_database}"
    PG_USER: "eigent"
    PG_PASSWORD: "camel"
  cwd: "${agent_workspace}"
client_session_timeout_seconds: 60
cache_tools_list: true
