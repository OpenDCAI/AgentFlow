# Google Forms
# Source: https://github.com/matteoantoci/google-forms-mcp
# Mock: PG-backed local server
type: stdio
name: google_forms
params:
  command: node
  args:
    - "${local_servers_paths}/google-forms-mcp/environment/build/index.js"
  env:
    PG_HOST: "${config.pg_host}"
    PG_PORT: "5434"
    PG_DATABASE: "${config.pg_database}"
    PG_USER: "eigent"
    PG_PASSWORD: "camel"
client_session_timeout_seconds: 60
cache_tools_list: true
