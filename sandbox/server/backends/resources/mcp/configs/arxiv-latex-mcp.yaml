# Fetch latex source from arxiv
# Source: https://github.com/takashiishida/arxiv-latex-mcp
# Toolathlon Version: The same
type: stdio
name: arxiv-latex
params:
  command: uv
  args:
    - "--directory"
    - "${local_servers_paths}/arxiv-latex-mcp/environment"
    - "run"
    - "python"
    - "server/main.py"
  env:
    PG_HOST: "${config.pg_host}"
    PG_PORT: "5434"
    PG_DATABASE: "${config.pg_database}"
    PG_USER: "eigent"
    PG_PASSWORD: "camel"
  # cwd: "${agent_workspace}" # do not add this for compatibility
client_session_timeout_seconds: 120
cache_tools_list: true